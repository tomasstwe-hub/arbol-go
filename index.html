<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ÁRBOL GO · Street Forest</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0f12">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
<style>
:root{
  --bg:#0d0f12; --panel:#171a20; --panel2:#1f242c; --line:#2b323d;
  --neon:#39ff14; --pink:#ff2e88; --cyan:#00e5ff; --yellow:#ffe600;
  --txt:#f2f5f7; --dim:#8b97a5;
  --ok:#39ff14; --warn:#ffe600; --bad:#ff3b3b;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;overscroll-behavior:none}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;background:
  radial-gradient(circle at 85% -10%, rgba(57,255,20,.08), transparent 40%),
  radial-gradient(circle at -10% 30%, rgba(255,46,136,.07), transparent 40%), var(--bg)}
header{padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--line)}
.logo{font-weight:900;font-size:24px;font-style:italic;letter-spacing:-1px;transform:rotate(-2deg)}
.logo .a{color:var(--neon);text-shadow:0 0 12px rgba(57,255,20,.6)}
.logo .g{color:var(--pink);text-shadow:0 0 12px rgba(255,46,136,.6)}
.logo small{display:block;font-size:9px;letter-spacing:3px;color:var(--dim);font-style:normal;transform:none}
.chip{background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:6px 12px;font-size:12px;font-weight:700;display:flex;gap:10px;align-items:center}
.chip .lv{color:var(--cyan)}
.chip .hj{color:var(--neon)}
main{flex:1;overflow-y:auto;padding:14px 14px 90px}
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;background:rgba(13,15,18,.97);border-top:2px solid var(--line);z-index:1000;backdrop-filter:blur(6px)}
nav button{flex:1;background:none;border:none;color:var(--dim);padding:9px 2px 10px;font-size:10px;font-weight:800;cursor:pointer;position:relative;letter-spacing:.5px}
nav button .ic{display:block;font-size:21px;margin-bottom:2px;filter:grayscale(1) opacity(.6)}
nav button.on{color:var(--neon)}
nav button.on .ic{filter:none}
nav .bdg{position:absolute;top:2px;right:calc(50% - 22px);background:var(--bad);color:#fff;font-size:10px;min-width:17px;height:17px;border-radius:9px;line-height:17px;font-weight:900}
h2.sec{font-size:20px;font-weight:900;font-style:italic;margin:4px 0 12px;transform:rotate(-1deg)}
h2.sec span{background:linear-gradient(90deg,var(--neon),var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
.banner{border-radius:12px;padding:10px 14px;margin-bottom:12px;font-size:13px;font-weight:700;border:1px solid}
.banner.bad{background:rgba(255,59,59,.12);border-color:var(--bad);color:#ff8a8a}
.banner.ok{background:rgba(57,255,20,.08);border-color:rgba(57,255,20,.4);color:var(--neon)}
.btn{display:inline-block;background:var(--neon);color:#0a0c0e;border:none;border-radius:10px;padding:11px 18px;font-size:14px;font-weight:900;cursor:pointer;font-style:italic;letter-spacing:.3px;box-shadow:0 0 14px rgba(57,255,20,.25)}
.btn.pink{background:var(--pink);color:#fff;box-shadow:0 0 14px rgba(255,46,136,.3)}
.btn.ghost{background:var(--panel2);color:var(--txt);border:1px solid var(--line);box-shadow:none}
.btn.sm{padding:7px 12px;font-size:12px}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn.full{width:100%;text-align:center}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.stat{background:var(--panel2);border-radius:12px;padding:10px;text-align:center;border:1px solid var(--line)}
.stat .v{font-size:19px;font-weight:900;color:var(--neon)}
.stat .v.pk{color:var(--pink)} .stat .v.cy{color:var(--cyan)} .stat .v.yl{color:var(--yellow)}
.stat .l{font-size:10px;color:var(--dim);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-top:2px}
#map,#miniMap{height:340px;border-radius:14px;border:2px solid var(--line);z-index:1}
#miniMap{height:200px}
.leaflet-container{background:#0d0f12;font:inherit}
.tree{display:flex;gap:12px;align-items:center}
.tree .em{font-size:34px;width:54px;height:54px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:var(--panel2);border:2px solid var(--line);flex-shrink:0}
.tree .em.st-ok{border-color:var(--ok)} .tree .em.st-warn{border-color:var(--warn)} .tree .em.st-bad{border-color:var(--bad);animation:puls 1.2s infinite}
@keyframes puls{50%{box-shadow:0 0 14px rgba(255,59,59,.7)}}
.tree .nm{font-weight:900;font-size:15px}
.tree .meta{font-size:11px;color:var(--dim);margin-top:2px}
.tag{display:inline-block;font-size:10px;font-weight:900;padding:2px 8px;border-radius:8px;margin-top:4px}
.tag.ok{background:rgba(57,255,20,.14);color:var(--ok)}
.tag.warn{background:rgba(255,230,0,.14);color:var(--warn)}
.tag.bad{background:rgba(255,59,59,.16);color:var(--bad)}
.trow{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.detail{font-size:12px;color:var(--dim);line-height:1.9;margin-top:10px;border-top:1px dashed var(--line);padding-top:8px}
.detail b{color:var(--txt)}
input,select,textarea{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:11px;font-size:14px;margin-bottom:10px;font-family:inherit}
label{font-size:11px;font-weight:800;color:var(--dim);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:5px}
.spick{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:10px}
.spick .sp{flex-shrink:0;width:86px;background:var(--panel2);border:2px solid var(--line);border-radius:12px;padding:10px 6px;text-align:center;cursor:pointer}
.spick .sp.sel{border-color:var(--neon);box-shadow:0 0 10px rgba(57,255,20,.3)}
.spick .sp .e{font-size:26px}.spick .sp .n{font-size:11px;font-weight:800;margin-top:4px}
.spick .sp .s{font-size:9px;color:var(--dim)}
#modal{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:2000;display:none;align-items:center;justify-content:center;padding:20px}
#modal.open{display:flex}
#modal .box{background:var(--panel);border:2px solid var(--line);border-radius:18px;padding:22px;max-width:400px;width:100%;max-height:85vh;overflow-y:auto}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--neon);color:#0a0c0e;font-weight:900;padding:10px 20px;border-radius:12px;z-index:3000;font-style:italic;box-shadow:0 4px 24px rgba(57,255,20,.5);animation:tin .25s}
@keyframes tin{from{transform:translateX(-50%) translateY(-30px);opacity:0}}
.xpbar{height:12px;background:var(--panel2);border-radius:6px;overflow:hidden;border:1px solid var(--line);margin:6px 0 4px}
.xpbar i{display:block;height:100%;background:linear-gradient(90deg,var(--neon),var(--cyan));border-radius:6px;transition:width .5s}
.badge{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center}
.badge.off{opacity:.3;filter:grayscale(1)}
.badge .e{font-size:26px}.badge .t{font-size:10px;font-weight:800;margin-top:4px}
.shop-item{display:flex;align-items:center;gap:12px}
.shop-item .e{font-size:30px}
.price{color:var(--neon);font-weight:900;font-size:14px;white-space:nowrap}
.avrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;justify-content:center}
.avrow span{font-size:26px;padding:7px 4px;background:var(--panel2);border:2px solid var(--line);border-radius:12px;cursor:pointer;width:64px;text-align:center}
.avrow span small{display:block;font-size:8px;color:var(--dim);font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-top:2px}
.avrow span.sel{border-color:var(--pink);box-shadow:0 0 10px rgba(255,46,136,.4)}
.foto{width:100%;border-radius:10px;margin-top:8px;border:1px solid var(--line)}
.bubble{position:relative;background:var(--panel2);border:2px solid var(--neon);border-radius:14px;padding:12px 14px;font-size:14px;font-weight:700;margin-bottom:16px;text-align:center}
.bubble:after{content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);border:10px solid transparent;border-top-color:var(--neon);border-bottom:0}
.bubble.alarm{border-color:var(--bad)} .bubble.alarm:after{border-top-color:var(--bad)}
.bubble.sad{border-color:var(--cyan)} .bubble.sad:after{border-top-color:var(--cyan)}
.mono-stage{text-align:center}
.monoSvg{cursor:pointer}
.monoSvg.bounce{animation:mbounce .5s}
@keyframes mbounce{30%{transform:translateY(-14px) rotate(-3deg)}60%{transform:translateY(0)}80%{transform:translateY(-6px)}}
.goalrow{display:flex;gap:14px;justify-content:center;align-items:center;margin:12px 0 6px}
.flame{font-size:20px;font-weight:900;color:var(--yellow)}
.goalbar{flex:1;max-width:200px}
.witem{background:var(--panel2);border:2px solid var(--line);border-radius:12px;padding:10px 6px;text-align:center}
.witem.eq{border-color:var(--neon);box-shadow:0 0 8px rgba(57,255,20,.3)}
.witem .e{font-size:26px}
.witem .n{font-size:10px;font-weight:800;margin:4px 0}
.witem .p{font-size:11px;font-weight:900;color:var(--neon);margin-bottom:5px}
.heart{position:absolute;bottom:30%;font-size:20px;animation:floatheart 1.3s ease-out forwards;pointer-events:none}
@keyframes floatheart{0%{transform:translateY(0) scale(.6);opacity:1}100%{transform:translateY(-90px) scale(1.4);opacity:0}}
#petFace.bounce{animation:mbounce .5s}
.sticker{position:absolute;font-size:11px;font-weight:900;font-style:italic;padding:3px 10px;border-radius:8px;transform:rotate(4deg)}
.center{text-align:center}
.dim{color:var(--dim);font-size:12px}
</style>
</head>
<body>
<div id="nojs" style="background:#ff3b3b;color:#fff;padding:16px;text-align:center;font-weight:800;font-size:14px;line-height:1.6">⚠️ Este visor no puede ejecutar el juego.<br>Descarga el archivo y ábrelo con <u>Chrome</u>.<br><span style="font-weight:400;font-size:12px">Android: Mis Archivos → arbol_go.html → Abrir con Chrome</span></div>
<div id="app">
  <header>
    <div class="logo"><span class="a">ÁRBOL</span> <span class="g">GO</span><small>STREET FOREST · CD. OBREGÓN</small></div>
    <div class="chip"><span id="chipAv">🛹</span><span class="lv" id="chipLv">Lv1</span><span class="hj" id="chipHj">🍃0</span></div>
  </header>
  <main id="view"></main>
  <nav id="nav">
    <button data-t="mono"><span class="ic">😎</span>MI MONO</button>
    <button data-t="mapa"><span class="ic">🗺️</span>MAPA</button>
    <button data-t="arboles"><span class="ic">🌳</span>MI CREW</button>
    <button data-t="plantar"><span class="ic">➕</span>PLANTAR</button>
    <button data-t="tienda"><span class="ic">🛒</span>TIENDA</button>
    <button data-t="perfil"><span class="ic">🏆</span>PERFIL</button>
  </nav>
</div>
<div id="modal"></div>

<script>
document.getElementById('nojs').remove();
/* ================= DATOS ================= */
const OBREGON = [27.4828, -109.9304];
const DAY = 86400000;
const PUB = 'https://tomasstwe-hub.github.io/arbol-go/';

const SPECIES = {
  mezquite:  {nombre:'Mezquite',   emoji:'🌳', sci:'Prosopis velutina',      base:true,  riego:4, co2:18, canopy:40, desc:'El rey del desierto. Sombra, vainas y raíces profundas.',
    tipo:'Leguminosa del desierto', crec:'60-100 cm/año (rápido)', alt:'8-12 m', vida:'100+ años',
    totem:{e:'🐺',n:'Coyote',rel:'El coyote come las vainas dulces del mezquite y esparce sus semillas por todo el monte. Sin coyotes habría menos mezquites.'}},
  paloverde: {nombre:'Palo Verde', emoji:'🌵', sci:'Parkinsonia microphylla', base:true,  riego:5, co2:12, canopy:25, desc:'Tronco verde que hace fotosíntesis. Flores amarillas.',
    tipo:'Leguminosa de tronco verde (¡hace fotosíntesis sin hojas!)', crec:'40-60 cm/año', alt:'5-8 m', vida:'~100 años',
    totem:{e:'🐇',n:'Liebre',rel:'La liebre del desierto se refugia del sol bajo el palo verde y mordisquea sus ramas tiernas. Es el árbol oficial del desierto sonorense.'}},
  guamuchil: {nombre:'Guamúchil',  emoji:'🌲', sci:'Pithecellobium dulce',    base:true,  riego:3, co2:22, canopy:50, desc:'Sombra gigante y fruta para los pájaros (y para ti).',
    tipo:'Leguminosa de sombra grande', crec:'80-120 cm/año (muy rápido)', alt:'10-15 m', vida:'80+ años',
    totem:{e:'🦎',n:'Iguana',rel:'Las iguanas y los pájaros se dan festín con la fruta del guamúchil. Tú también puedes: es agridulce y se come con chile.'}},
  palofierro:{nombre:'Palo Fierro',emoji:'🪵', sci:'Olneya tesota',           cost:200,   riego:6, co2:15, canopy:30, desc:'Madera durísima, vive siglos. Nodriza del desierto.',
    tipo:'Leguminosa, la madera más dura de Sonora', crec:'20-30 cm/año (lento pero eterno)', alt:'6-10 m', vida:'¡hasta 800 años!',
    totem:{e:'🦌',n:'Venado Bura',rel:'El venado bura ramonea el palo fierro, el "árbol nodriza": bajo su sombra nacen cactus, aves y medio desierto.'}},
  guayacan:  {nombre:'Guayacán',   emoji:'💜', sci:'Guaiacum coulteri',       cost:300,   riego:4, co2:10, canopy:20, desc:'Flores moradas de otro planeta. Joya sonorense.',
    tipo:'Árbol de flor del monte espinoso', crec:'20-40 cm/año (lento)', alt:'4-8 m', vida:'200+ años',
    totem:{e:'🐝',n:'Abeja',rel:'Las abejas nativas aman las flores moradas del guayacán. Cada guayacán plantado es un comedero para polinizadores.'}},
  amapa:     {nombre:'Amapa',      emoji:'🌸', sci:'Tabebuia impetiginosa',   cost:400,   riego:3, co2:20, canopy:35, desc:'Explota en rosa cada primavera. Nivel leyenda.',
    tipo:'Árbol de flor de la selva baja', crec:'50-80 cm/año', alt:'10-20 m', vida:'100+ años',
    totem:{e:'🐦',n:'Colibrí',rel:'Los colibríes viajan kilómetros para beber el néctar rosa de la amapa cuando florece en primavera.'}},
  alamo:     {nombre:'Álamo',      emoji:'🍃', sci:'Populus fremontii',       cost:500,   riego:2, co2:30, canopy:60, desc:'Bestia de crecimiento rápido. Necesita agua constante.',
    tipo:'Ripario: amante del agua y los ríos', crec:'150-250 cm/año (el más rápido)', alt:'15-25 m', vida:'~100 años',
    totem:{e:'🦫',n:'Castor',rel:'El castor de los ríos de Sonora construye su casa con ramas de álamo. Donde hay álamos, hay agua y hay vida.'}}
};

const LEVELS = [
  {xp:0,    t:'Semilla Rookie',       e:'🛹'},
  {xp:300,  t:'Plantador Callejero',  e:'🧢'},
  {xp:800,  t:'Guardián del Barrio',  e:'🔥'},
  {xp:1600, t:'Ranger Urbano',        e:'🌵'},
  {xp:3000, t:'Maestro Mezquitero',   e:'🌳'},
  {xp:5000, t:'Leyenda Verde',        e:'👑'}
];

// Clima Cd. Obregón por mes (0=Ene): horas luz/día, horas >35°C/día, horas <7°C/día
const DAYLIGHT = [10.5,11.1,12.0,13.0,13.8,14.2,14.0,13.3,12.4,11.4,10.6,10.2];
const HOT  = [0,0,0,1,4,8,9,9,7,3,0,0];
const COLD = [3,2,0.5,0,0,0,0,0,0,0,0.5,2.5];
// Factor de riego por temporada (verano = más seguido)
const SEASON = [1.6,1.6,1.0,1.0,0.8,0.6,0.6,0.6,0.6,0.8,1.6,1.6];

const XP_PLANT=100, XP_RIEGO=15, XP_RIEGO_EARLY=3, XP_CHECKIN=20;
const HJ_PLANT=50, HJ_RIEGO=10, PRECIO_ARBOL=150;
const COFRE_PRECIO=250;

// Convenios con locales de Obregón — poner activo:true cuando exista el acuerdo con cada negocio
const PATROCINIOS=[
  {k:'tacos',  e:'🌮', premio:'2 tacos de carne asada',   lugar:'Carreta aliada',   activo:false},
  {k:'hotdog', e:'🌭', premio:'1 hot dog estilo Sonora',  lugar:'Carreta aliada',   activo:false},
  {k:'burrito',e:'🌯', premio:'1 burrito mañanero',       lugar:'Local aliado',     activo:false},
  {k:'cafe',   e:'☕', premio:'1 café americano',         lugar:'Cafetería aliada', activo:false}
];
const META_DIA = 30; // XP diarios para mantener la racha

// Ropero del mono — se compra con hojas 🍃
const ITEMS = {
  skate_base: {n:'Patineta Clásica', e:'🛹', p:0,    slot:'skate',  c:'#8b97a5'},
  cap_red:    {n:'Gorra Roja',       e:'🧢', p:80,   slot:'cap',    c:'#e03535'},
  cap_neon:   {n:'Gorra Neón',       e:'🧢', p:150,  slot:'cap',    c:'#39ff14'},
  lentes:     {n:'Lentes Oscuros',   e:'🕶️', p:120,  slot:'glasses'},
  hoodie_pink:{n:'Hoodie Rosa',      e:'🧥', p:100,  slot:'hoodie', c:'#ff2e88'},
  hoodie_cyan:{n:'Hoodie Cian',      e:'🧥', p:100,  slot:'hoodie', c:'#00a8bd'},
  audifonos:  {n:'Audífonos',        e:'🎧', p:200,  slot:'phones', lvl:2},
  skate_fuego:{n:'Patineta Fuego',   e:'🔥', p:250,  slot:'skate',  c:'#ff6a00', lvl:2},
  mascota:    {n:'Perrito Callejero',e:'🐕', p:400,  slot:'pet',    lvl:3},
  mohawk:     {n:'Mohawk Verde',     e:'🤘', p:300,  slot:'cap',    c:'#39ff14', lvl:3},
  corona:     {n:'Corona Leyenda',   e:'👑', p:1000, slot:'cap',    lvl:6}
};

// Mascotas tamagotchi: cada tótem ganado puede acompañarte y da un poder según su lazo
const MASCOTAS = {
  mezquite:  {e:'🐺', n:'Coyote',      b:'plantar',    boost:'Al plantar: +3 🍃 por nivel de lazo'},
  paloverde: {e:'🐇', n:'Liebre',      b:'regar',      boost:'Al regar: +2 XP por nivel de lazo'},
  guamuchil: {e:'🦎', n:'Iguana',      b:'checkin',    boost:'En check-ins: +2 XP por nivel de lazo'},
  palofierro:{e:'🦌', n:'Venado Bura', b:'ronda',      boost:'Chambas de ronda: +2 XP de equipo por nivel'},
  guayacan:  {e:'🐝', n:'Abeja',       b:'trivia',     boost:'Trivia correcta: +1 🍃 por nivel de lazo'},
  amapa:     {e:'🐦', n:'Colibrí',     b:'meta',       boost:'Meta diaria: +2 🍃 por nivel de lazo'},
  alamo:     {e:'🦫', n:'Castor',      b:'regarHojas', boost:'Al regar: +2 🍃 por nivel de lazo'}
};
const LAZO=[0,50,150,350,700];
const LAZO_NOM=['Conocidos','Compas','Cuates','Inseparables','Nahual'];
const REQ_AMIGO=3; // árboles plantados de una especie para que su animal sea tu compa
function cuentaEspecie(k){ return S.trees.filter(t=>t.especie===k).length; }
function amigoDisponible(k){ return !!S.player.pets[k] || cuentaEspecie(k)>=REQ_AMIGO; }
function petActiva(){ const k=S.player&&S.player.petActivo; return (k&&S.player.pets&&S.player.pets[k])?{k,info:MASCOTAS[k],...S.player.pets[k]}:null; }
function lazoNivel(bond){ let n=1; LAZO.forEach((x,i)=>{ if(bond>=x) n=i+1; }); return n; }
function petHambre(p){ if(!p.fed) return 9; return Math.round((new Date(dayStr())-new Date(p.fed))/DAY); }
function petEstado(p){ const d=petHambre(p); return d<=1?'feliz':(d<=2?'hambriento':'triste'); }
function petBoost(tipo){
  const p=petActiva();
  if(!p || p.info.b!==tipo || petEstado(p)!=='feliz') return 0;
  if(p.conf && Date.now()<p.conf) return 0; // agarrando confianza: sin poder el primer día
  return lazoNivel(p.bond);
}

// Frases del compa según especie y ánimo
const FRASES={
  mezquite:  ['¡Auuu! Hoy huele a mezquite 🌳','Contigo hasta el fin del monte 🐾','¿Ya regamos? Yo superviso 😏'],
  paloverde: ['¡Brinquemos a regar! 💨','Tus riegos son mi cardio 🐇','Rapidito al parque, ¿no?'],

function fraseCompa(pa){
  const est=petEstado(pa);
  if(est==='triste') return '¿Ya no me quieres? 💔 Dame de comer, porfa…';
  if(est==='hambriento') return 'Oye… tengo hambre 🥺 ¿me das mi botana?';
  const d=diasJuntos(pa);
  const pool=[...(FRASES[pa.k]||[])];
  if(d>=7) pool.push(`Llevamos ${d} días juntos 🐾 Los mejores de mi vida.`);
  return pool[Math.floor(Math.random()*pool.length)];
}
function diasJuntos(pa){ return Math.floor((Date.now()-(pa.desde||Date.now()))/DAY); }
function apapachar(){
  const pa=petActiva(); if(!pa) return;
  const p=S.player.pets[pa.k];
  if(!p.car || p.car.d!==dayStr()) p.car={d:dayStr(), n:0};

  const host=document.getElementById('petCard');

  if(p.car.n>=3){ toast(`${pa.info.e} ${fraseCompa(pa)} · 💤 Ya me apapachaste mucho hoy`); return; }
  p.car.n++; p.bond+=2; save();

function yesterdayStr(){ const d=new Date(); d.setDate(d.getDate()-1); return dayStr(d); }

let S = null, STORAGE_OK = true;
function load(){
  try{ S = JSON.parse(localStorage.getItem('arbolgo')||'null'); }catch(e){ S=null; STORAGE_OK=false; }
  if(!S) S = {player:null, trees:[], unlocked:['mezquite','paloverde','guamuchil'], log:[]};
  if(S.player){
    initGear(S.player);
    // Migración: tótems ganados por árboles ya plantados
    S.trees.forEach(t=>{ if(!S.player.totems.includes(t.especie)) S.player.totems.push(t.especie); });
    if(S.player.dayDate!==dayStr()){ S.player.dayXP=0; S.player.dayDate=dayStr(); }
    // Racha rota: no cumplió la meta ayer
    if(S.player.lastDay && S.player.lastDay<yesterdayStr() && S.player.strk>0){
      S.player.prevStrk=S.player.strk; S.player.strk=0; S.player.strkLost=true;
    }
    // Aniversario semanal con el compa: +15 lazo por cada semana juntos
    const pk=S.player.petActivo;
    if(pk && S.player.pets[pk]){
      const p=S.player.pets[pk];
      if(!p.desde) p.desde=Date.now();
      const sem=Math.floor((Date.now()-p.desde)/(7*DAY));
      if(sem>(p.aniv||0)){
        p.bond+=15*(sem-(p.aniv||0)); p.aniv=sem;
        setTimeout(()=>toast(`${MASCOTAS[pk].e} ¡${p.nombre||MASCOTAS[pk].n} cumple ${sem} semana${sem>1?'s':''} contigo! +15 lazo de aniversario 🎂🐾`),1000);
      }
    }
  }
}
function save(){
  try{ localStorage.setItem('arbolgo', JSON.stringify(S)); }
  catch(e){
    if(STORAGE_OK){ STORAGE_OK=false; try{ toast('⚠️ Memoria del navegador llena — exporta tu registro desde PERFIL'); }catch(_){} }
  }
}

/* ================= HELPERS ================= */
const $ = s=>document.querySelector(s);
const esc = s=>(s||'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
function toast(msg){ const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2200); }
function fmtDias(d){ if(d<1) return 'hoy'; if(d<30) return Math.floor(d)+' días'; if(d<365) return (d/30.4).toFixed(1)+' meses'; return (d/365).toFixed(1)+' años'; }

function levelOf(xp){ let i=0; LEVELS.forEach((l,k)=>{ if(xp>=l.xp) i=k; }); return i; }

function lastRiego(t){ return t.riegos.length ? t.riegos[t.riegos.length-1].f : t.fecha; }

function guardiaDe(t){
  if(!t.ronda || !t.ronda.g || !t.ronda.g.length) return null;
  const sem = Math.floor((Date.now()-t.ronda.i)/(7*DAY));
  return t.ronda.g[((sem % t.ronda.g.length)+t.ronda.g.length) % t.ronda.g.length];
}
function rolDe(t, nombre){
  if(!t.ronda || !t.ronda.g || !t.ronda.g.length) return null;
  const i = t.ronda.g.indexOf(nombre);
  if(i<0) return null;
  const len = t.ronda.g.length;
  const sem = Math.floor((Date.now()-t.ronda.i)/(7*DAY));
  if(i === ((sem%len)+len)%len) return '💧 Regador';
  if(len>1 && i === (((sem+1)%len)+len)%len) return '📸 Vigilante';
  return '🍃 Apoyo';
}
function medallaEquipo(t){
  const x=t.teamXP||0;
  if(x>=800) return {e:'🥇',n:'Equipo de Oro',next:null};
  if(x>=300) return {e:'🥈',n:'Equipo de Plata',next:800};
  if(x>=100) return {e:'🥉',n:'Equipo de Bronce',next:300};
  return {e:'🌱',n:'Equipo Semilla',next:100};
}

function statusOf(t){
  const sp = SPECIES[t.especie];
  const need = sp.riego * SEASON[new Date().getMonth()];
  const days = (Date.now() - lastRiego(t)) / DAY;
  const ratio = days / need;
  if(ratio >= 1) return {k:'bad', txt:'🚨 RIEGO URGENTE', ratio, need};
  if(ratio >= .7) return {k:'warn', txt:'💧 Riego pronto', ratio, need};
  return {k:'ok', txt:'💚 Al tiro', ratio, need};
}

function climaTree(t){
  // Suma horas de luz / calor / frío desde plantado, por mes
  let luz=0, calor=0, frio=0;
  const d = new Date(t.fecha), end = new Date();
  for(let x=new Date(d); x<=end; x.setDate(x.getDate()+1)){
    const m = x.getMonth();
    luz+=DAYLIGHT[m]; calor+=HOT[m]; frio+=COLD[m];
  }
  return {luz:Math.round(luz), calor:Math.round(calor), frio:Math.round(frio)};
}

function co2Of(t){
  const sp=SPECIES[t.especie];
  const yrs=(Date.now()-t.fecha)/DAY/365;
  return sp.co2 * yrs * Math.min(1, 0.3 + yrs/4);
}
function canopyOf(t){
  const sp=SPECIES[t.especie];
  const yrs=(Date.now()-t.fecha)/DAY/365;
  return sp.canopy * Math.min(1, yrs/10);
}
function urgentCount(){ return S.trees.filter(t=>statusOf(t).k==='bad').length; }

function addXP(xp, hojas){
  const before = levelOf(S.player.xp);
  S.player.xp += xp; S.player.hojas += (hojas||0);
  // Meta diaria y racha estilo Duolingo
  if(S.player.dayDate!==dayStr()){ S.player.dayXP=0; S.player.dayDate=dayStr(); }
  S.player.dayXP += xp;
  if(S.player.dayXP>=META_DIA && S.player.lastDay!==dayStr()){
    S.player.strk = (S.player.lastDay===yesterdayStr()) ? S.player.strk+1 : 1;
    S.player.lastDay = dayStr(); S.player.strkLost=false;
    const bm=petBoost('meta')*2; if(bm) S.player.hojas+=bm;
    setTimeout(()=>toast(`🔥 ¡META DEL DÍA! Racha: ${S.player.strk} día${S.player.strk>1?'s':''}${bm?` · 🐦 +${bm}🍃 del colibrí`:''}`),400);
  }
  // La mascota gana lazo con todo lo que haces (si no está triste)
  const pa=petActiva();
  if(pa && petEstado(pa)!=='triste'){
    const antes=lazoNivel(S.player.pets[pa.k].bond);
    S.player.pets[pa.k].bond += Math.max(1, Math.round(xp/10));
    const desp=lazoNivel(S.player.pets[pa.k].bond);
    if(desp>antes) setTimeout(()=>toast(`${pa.info.e} ¡LAZO NIVEL ${desp}: ${LAZO_NOM[desp-1].toUpperCase()}! Su poder creció 🐾`),1200);
  }
  const after = levelOf(S.player.xp);
  if(after>before) setTimeout(()=>toast(`⬆️ ¡SUBISTE A ${LEVELS[after].t.toUpperCase()} ${LEVELS[after].e}! Tu mono evolucionó 😎`),900);
  save(); renderChip();
}

function badges(){
  const bySp = {};
  S.trees.forEach(t=>bySp[t.especie]=(bySp[t.especie]||0)+1);
  const riegos = S.trees.reduce((a,t)=>a+t.riegos.length,0);
  const list = [];
  Object.entries(SPECIES).forEach(([k,sp])=>{
    list.push({e:sp.emoji, t:`Experto en ${sp.nombre}`, on:(bySp[k]||0)>=3, prog:`${bySp[k]||0}/3`});
  });
  list.push({e:'💧', t:'Hidro Homie',   on:riegos>=25,           prog:`${riegos}/25 riegos`});
  list.push({e:'🌊', t:'Rey del Riego', on:riegos>=100,          prog:`${riegos}/100 riegos`});
  list.push({e:'🏙️', t:'10 en la Calle',on:S.trees.length>=10,   prog:`${S.trees.length}/10 árboles`});
  list.push({e:'🔥', t:'Racha x7',      on:(S.player?.racha||0)>=7, prog:`racha ${S.player?.racha||0}/7`});
  list.push({e:'📅', t:'Semana Perfecta',on:(S.player?.strk||0)>=7, prog:`${S.player?.strk||0}/7 días`});
  const nt=S.player?.totems?.length||0;
  list.push({e:'🪶', t:'Todos los Tótems',on:nt>=Object.keys(SPECIES).length, prog:`${nt}/${Object.keys(SPECIES).length}`});
  return list;
}

}

  S.player.racha=(S.player.racha||0)+1;
  const cur=guardiaDe(t);
  const bxp=petBoost('regar')*2, bhj=petBoost('regarHojas')*2, beq=petBoost('ronda')*2;

function checkin(id){
  const t = S.trees.find(x=>x.id===id);
  if(t.chk===dayStr()){ toast('📸 Ya monitoreaste este árbol hoy. ¡Vuelve mañana!'); return; }
  openModal(`<h2 class="sec">📸 CHECK-IN: <span>${esc(t.nombre)}</span></h2>
    <label>¿Cómo está el árbol?</label>
    <select id="cond"><option>💪 Sano y creciendo</option><option>😰 Estresado (hojas caídas)</option><option>🤕 Dañado (vandalismo/plaga)</option></select>
    <label>Foto (opcional)</label>
    <input type="file" id="ft" accept="image/*" capture="environment">
    <button class="btn full" onclick="doCheckin(${id})">GUARDAR +${XP_CHECKIN} XP</button>`);
}
function doCheckin(id){
  const t = S.trees.find(x=>x.id===id);
  t.condicion = $('#cond').value;
  t.chk = dayStr();
  const f = $('#ft').files[0];
  const esVigia = rolDe(t,S.player.name)==='📸 Vigilante';
  const fin = ()=>{
    const bc=petBoost('checkin')*2, beq=petBoost('ronda')*2;
    if(esVigia){ t.teamXP=(t.teamXP||0)+10+beq; addXP(XP_CHECKIN+10+bc,10); }
    else addXP(XP_CHECKIN+bc,5);
    save(); closeModal();
    toast(esVigia?`📸 ¡CHAMBA DE VIGILANTE CUMPLIDA! +${XP_CHECKIN+10+bc} XP · +${10+beq} XP de equipo 🤝${bc?' · 🦎🐾':''}`:`📸 +${XP_CHECKIN+bc} XP · Monitoreo registrado${bc?' · 🦎 +'+bc+' XP de tu iguana 🐾':''}`);
    render();
  };
  if(f){
    const img=new Image(), r=new FileReader();
    r.onload=e=>{ img.onload=()=>{ const c=document.createElement('canvas'); const k=240/Math.max(img.width,img.height);
      c.width=img.width*k; c.height=img.height*k; c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      t.foto=c.toDataURL('image/jpeg',.6); fin(); }; img.src=e.target.result; };
    r.readAsDataURL(f);
  } else fin();
}

function vPlantar(){

    h += `<div class="card center"><div style="font-size:44px">😬</div><p style="margin:10px 0;font-weight:800">Sin créditos de árbol.</p><p class="dim">Junta 🍃 regando y monitoreando tu crew, y cámbialas en la TIENDA por más árboles.</p><br><button class="btn pink" onclick="TAB='tienda';render()">🛒 IR A LA TIENDA</button></div>`;

  }

  <div class="card">

    <div class="spick" id="spick">${S.unlocked.map(k=>{const sp=SPECIES[k];return `<div class="sp ${k===plantSp?'sel':''}" data-k="${k}"><div class="e">${sp.emoji}</div><div class="n">${sp.nombre}</div><div class="s">riego c/${sp.riego}d</div></div>`;}).join('')}</div>

    <button class="btn sm ghost" id="verTotem" onclick="totemCard(plantSp)" style="margin-bottom:10px">${SPECIES[plantSp].totem.e} VER TÓTEM Y FICHA DEL ÁRBOL</button>
    <label>Apodo del árbol</label>
    <input id="tnom" placeholder="Ej. El Mezquite del Parque Norte" maxlength="40">
    <label>Ubicación — toca el mapa donde lo plantaste</label>
    <div id="miniMap"></div>
    <div class="trow">
      <button class="btn sm ghost" onclick="usarGPS()">📡 USAR MI GPS</button>
      <span class="dim" id="locTxt" style="align-self:center">${plantLoc?`📍 ${plantLoc[0].toFixed(4)}, ${plantLoc[1].toFixed(4)}`:'Sin ubicación aún'}</span>
    </div>
    <br><button class="btn full" onclick="doPlant()">🌱 ¡PLANTADO! REGISTRAR</button>
  </div>`;
  $('#view').innerHTML=h;
  $('#spick').addEventListener('click',e=>{ const s=e.target.closest('.sp'); if(!s)return; plantSp=s.dataset.k;
    document.querySelectorAll('.sp').forEach(x=>x.classList.toggle('sel',x.dataset.k===plantSp));
    $('#spdesc').textContent=SPECIES[plantSp].desc;
    $('#verTotem').innerHTML=`${SPECIES[plantSp].totem.e} VER TÓTEM Y FICHA DEL ÁRBOL`; });
  try{
    miniObj = L.map('miniMap').setView(plantLoc||OBREGON, 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM'}).addTo(miniObj);
    let mk = plantLoc? L.marker(plantLoc).addTo(miniObj) : null;
    miniObj.on('click',e=>{ plantLoc=[e.latlng.lat,e.latlng.lng]; if(mk)mk.remove(); mk=L.marker(plantLoc).addTo(miniObj);
      $('#locTxt').textContent=`📍 ${plantLoc[0].toFixed(4)}, ${plantLoc[1].toFixed(4)}`; });
  }catch(e){ $('#miniMap').innerHTML='<p class="dim center" style="padding:20px">Mapa no disponible sin internet — usa el botón GPS.</p>'; }
}
function usarGPS(){
  if(!navigator.geolocation){ toast('⚠️ GPS no disponible'); return; }
  toast('📡 Buscando señal...');
  navigator.geolocation.getCurrentPosition(p=>{
    plantLoc=[p.coords.latitude,p.coords.longitude];
    $('#locTxt').textContent=`📍 ${plantLoc[0].toFixed(4)}, ${plantLoc[1].toFixed(4)}`;
    if(miniObj){ miniObj.setView(plantLoc,16); L.marker(plantLoc).addTo(miniObj); }
  },()=>toast('⚠️ No se pudo obtener GPS — toca el mapa'));
}
function doPlant(){
  if(S.player.creditos<1){ toast('🎟️ Sin créditos de árbol — canjea hojas en la tienda'); TAB='tienda'; render(); return; }
  const nom = $('#tnom').value.trim();
  if(!nom){ toast('⚠️ Ponle un apodo a tu árbol'); return; }
  if(!plantLoc){ toast('⚠️ Marca dónde lo plantaste'); return; }
  S.trees.push({id:Date.now(), especie:plantSp, nombre:nom, lat:plantLoc[0], lng:plantLoc[1], fecha:Date.now(), riegos:[{f:Date.now()}], foto:null, condicion:null});
  S.player.creditos--;
  const nuevoTotem = !S.player.totems.includes(plantSp);
  if(nuevoTotem) S.player.totems.push(plantSp);
  const bp=petBoost('plantar')*3;
  addXP(XP_PLANT+(nuevoTotem?25:0), HJ_PLANT+(nuevoTotem?15:0)+bp);
  plantLoc=null;
  save();
  toast(`🌱 +${XP_PLANT+(nuevoTotem?25:0)} XP +${HJ_PLANT+(nuevoTotem?15:0)}🍃 · ¡${nom} está en el mapa!`);
  const sp=plantSp;
  TAB='arboles'; render();
  if(nuevoTotem) setTimeout(()=>{ toast(`${SPECIES[sp].totem.e} ¡NUEVO TÓTEM: ${SPECIES[sp].totem.n.toUpperCase()}!`); totemCard(sp); }, 900);
  else if(cuentaEspecie(sp)===REQ_AMIGO && !S.player.pets[sp])
    setTimeout(()=>{ toast(`${MASCOTAS[sp].e} ¡${MASCOTAS[sp].n.toUpperCase()} QUIERE SER TU COMPA! Ve a MI MONO 🐾`); }, 900);
}

/* ================= PLACA QR ================= */
function qrPayload(t){
  const d={n:t.nombre,e:t.especie,f:t.fecha,la:+t.lat.toFixed(5),lo:+t.lng.toFixed(5),p:S.player.name,av:S.player.avatar,ro:t.ronda||null};
  return PUB+'#a='+btoa(unescape(encodeURIComponent(JSON.stringify(d))));
}
function drawPlaca(t){
  const sp=SPECIES[t.especie], url=qrPayload(t);
  const c=document.createElement('canvas'); c.width=640; c.height=960;
  const x=c.getContext('2d');
  x.fillStyle='#ffffff'; x.fillRect(0,0,640,960);
  x.strokeStyle='#2fbf28'; x.lineWidth=12; x.strokeRect(14,14,612,932);
  x.strokeStyle='#ff2e88'; x.lineWidth=3; x.strokeRect(30,30,580,900);
  x.textAlign='center';
  x.fillStyle='#111'; x.font='italic 900 46px Arial';
  const w1=x.measureText('ÁRBOL ').width, w2=x.measureText('GO').width, x0=320-(w1+w2)/2;
  x.textAlign='left';
  x.fillStyle='#1f8f1a'; x.fillText('ÁRBOL ',x0,88);
  x.fillStyle='#ff2e88'; x.fillText('GO',x0+w1,88);
  x.textAlign='center';
  x.fillStyle='#888'; x.font='700 17px Arial';
  x.fillText('S T R E E T   F O R E S T   ·   C D .   O B R E G Ó N',320,116);
  x.font='90px Arial'; x.fillText(sp.emoji,320,215);
  let fs=34; x.font=`900 ${fs}px Arial`;
  while(x.measureText(t.nombre).width>560 && fs>18){ fs-=2; x.font=`900 ${fs}px Arial`; }
  x.fillStyle='#111'; x.fillText(t.nombre,320,268);
  x.fillStyle='#666'; x.font='italic 20px Arial';
  x.fillText(sp.nombre+' · '+sp.sci,320,300);
  x.fillStyle='#111'; x.font='700 22px Arial';
  x.fillText(`Plantado por ${S.player.avatar} ${S.player.name}`,320,345);
  x.fillStyle='#666'; x.font='18px Arial';
  x.fillText('el '+new Date(t.fecha).toLocaleDateString('es-MX',{day:'numeric',month:'long',year:'numeric'}),320,373);
  const q=new QRious({value:url,size:340,level:'M'});
  x.fillStyle='#f2f2f2'; x.fillRect(134,396,372,372);
  x.drawImage(q.canvas,150,412,340,340);
  x.fillStyle='#111'; x.font='900 28px Arial';
  x.fillText('📱 ESCANÉAME',320,812);
  x.fillStyle='#444'; x.font='19px Arial';
  x.fillText('y conoce mi historia: mi edad, mi CO₂ y quién me cuida',320,842);
  x.fillStyle='#1f8f1a'; x.font='700 19px Arial';
  x.fillText('🌳 Cada árbol cuenta · Planta el tuyo',320,890);
  x.fillStyle='#999'; x.font='14px Arial';
  x.fillText(PUB.replace('https://',''),320,920);
  return c;
}
function placaQR(id){
  const t=S.trees.find(x=>x.id===id);
  if(typeof QRious==='undefined'){ toast('🛜 Necesitas internet para generar el QR'); return; }
  const c=drawPlaca(t);
  openModal(`<h2 class="sec">🏷️ PLACA <span>QR</span> DE ${esc(t.nombre).toUpperCase()}</h2>
    <p style="font-size:13px;margin:8px 0">Descárgala, <b>imprímela y enmícala</b> (o en bolsita ziploc) y amárrala a tu árbol. Quien la escanee verá su historia viva: edad, CO₂ y quién lo cuida 🌳</p>

}
function descargarPlaca(id){

  const t=S.trees.find(x=>x.id===id);

  rondaModal(id);
}
let _adoptar=null;
function visitorTreeHash(){
  try{
    const d=JSON.parse(decodeURIComponent(escape(atob(location.hash.slice(3)))));
    _adoptar=d;
    const sp=SPECIES[d.e]||SPECIES.mezquite;
    const cur=d.ro&&d.ro.g&&d.ro.g.length ? d.ro.g[Math.floor((Date.now()-d.ro.i)/(7*DAY))%d.ro.g.length] : null;

    ${cur?`<div class="banner ok" style="text-align:center">Esta semana cuida: <b>${esc(cur)}</b></div>`:''}
    ${S.player
      ? `<button class="btn full" onclick="adoptarArbol()">🤝 UNIRME A LA RONDA (+25 XP)</button>`
      : `<button class="btn full" onclick="closeModal()">🎮 CREAR MI JUGADOR PRIMERO</button>`}`);
  }catch(e){ location.hash=''; if(!S.player) onboarding(); }

function adoptarArbol(){
  const d=_adoptar; if(!d) return;
  if(S.trees.some(t=>t.id===d.id)){ toast('🌳 Este árbol ya está en tu crew'); }
  else{
    const esp = (d.e in SPECIES)?d.e:'mezquite';
    const t={id:d.id, especie:esp, nombre:d.n, lat:+d.la||OBREGON[0], lng:+d.lo||OBREGON[1], fecha:d.f, riegos:[{f:Date.now()}], foto:null, condicion:null, ronda:d.ro||{g:[d.p],i:d.f}, teamXP:d.tx||0};
    t.ronda.av=t.ronda.av||{};
    if(!t.ronda.g.includes(S.player.name)) t.ronda.g.push(S.player.name);
    t.ronda.av[S.player.name]=S.player.avatar;
    S.trees.push(t);
    if(!S.player.totems.includes(esp)){ S.player.totems.push(esp); setTimeout(()=>totemCard(esp),900); }
    addXP(25,10);
    toast(`🤝 +25 XP · ¡Estás en la ronda de ${d.n}!`);
  }
  _adoptar=null; location.hash=''; save(); closeModal(); TAB='arboles'; render();
}

let tState=null;
function triviaHoy(){
  const s=dayStr(); let h=0; for(const c of s) h=(h*31+c.charCodeAt(0))>>>0;
  const idx=[]; let k=h%TRIVIA.length; const paso=(h%7)+1;
  while(idx.length<3){ if(!idx.includes(k)) idx.push(k); k=(k+paso)%TRIVIA.length; }
  return idx;
}
function startTrivia(){
  const p=S.player;
  if(!p.trivia || p.trivia.date!==dayStr()){ p.trivia={date:dayStr(), done:0, ok:0}; save(); }
  if(p.trivia.done>=3){
    openModal(`<h2 class="sec">🧠 TRIVIA <span>SONORENSE</span></h2><p class="center" style="margin:12px 0">Ya jugaste la de hoy: <b style="color:var(--neon)">${p.trivia.ok}/3</b> 🎯<br><br>Mañana hay 3 preguntas nuevas 🌵</p>`);
    return;
  }
  tState={idx:triviaHoy(), i:S.player.trivia.done};
  triviaQ();
}
function triviaQ(){
  const t=TRIVIA[tState.idx[tState.i]];
  openModal(`<h2 class="sec">🧠 TRIVIA <span>SONORENSE</span> <span class="dim" style="font-size:12px;font-style:normal">${tState.i+1}/3</span></h2>
    <p style="font-weight:800;font-size:15px;margin:12px 0">${t.q}</p>
    ${t.o.map((o,j)=>`<button class="btn ghost full" style="margin-bottom:8px;text-align:left;font-style:normal" onclick="triviaAns(${j})">${o}</button>`).join('')}`);
}
function triviaAns(j){
  const t=TRIVIA[tState.idx[tState.i]], ok=(j===t.a);
  S.player.trivia.done++; if(ok) S.player.trivia.ok++;
  addXP(ok?10:2, ok?5+petBoost('trivia'):0); save();
  const last=tState.i>=2;
  openModal(`<div class="center" style="font-size:44px">${ok?'✅':'❌'}</div>
    <p class="center" style="font-weight:900;margin:8px 0">${ok?'¡CORRECTO! +10 XP +5 🍃':'Casi... la buena era: '+t.o[t.a]+' (+2 XP por aprender)'}</p>

    <button class="btn full" onclick="${last?'closeModal();render();':'tState.i++;triviaQ();'}">${last?'🏁 TERMINAR':'SIGUIENTE ➡️'}</button>`);
}

function importar(inp){

  r.onload=e=>{ try{

  r.readAsText(inp.files[0]);

function buyItem(k){
  const it=ITEMS[k];
  if(S.player.items.includes(k) || S.player.hojas<it.p || (it.lvl && levelOf(S.player.xp)+1<it.lvl)) return;
  S.player.hojas-=it.p; S.player.items.push(k); S.player.gear[it.slot]=k;
  save(); toast(`${it.e} ¡${it.n} equipado! Tu mono está más pro 😎`); render();
}
function equipItem(k,on){
  S.player.gear[ITEMS[k].slot] = on?k:null;
  save(); render();
}

/* ================= MODAL / ONBOARDING ================= */
function openModal(html){ const m=$('#modal'); m.innerHTML=`<div class="box">${html}<br><button class="btn sm ghost full" onclick="closeModal()">CERRAR</button></div>`; m.classList.add('open'); }
function closeModal(){ $('#modal').classList.remove('open'); if(!S.player) onboarding(); }

// Fauna nativa de Sonora y el Valle del Yaqui
const AVATARES=[['🦌','Venado'],['🐺','Coyote'],['🦎','Cachora'],['🐍','Cascabel'],['🦉','Tecolote'],['🦅','Águila'],['🐢','Tortuga'],['🦂','Alacrán'],['🐆','Jaguar'],['🦇','Murciélago']];
let obAv='🦌';
function onboarding(){
  const m=$('#modal');
  m.innerHTML=`<div class="box center">
    <div class="logo" style="font-size:34px;margin-bottom:4px"><span class="a">ÁRBOL</span> <span class="g">GO</span></div>
    <p class="dim" style="letter-spacing:2px;font-size:10px;font-weight:800">PLANTA · RIEGA · SUBE DE NIVEL</p>
    <p style="margin:14px 0;font-size:14px">La ciudad es tu spot. Te regalamos <b style="color:var(--neon)">5 árboles nativos</b> para arrancar. Plántalos en parques, camellones o tu escuela, cuídalos y conviértete en <b style="color:var(--pink)">Leyenda Verde</b>. 🌳🔥</p>
    <label style="text-align:left">Tu nombre de jugador</label>
    <input id="obNom" placeholder="Ej. TomiShredder" maxlength="20">
    <label style="text-align:left">Tu animal — fauna de tu tierra</label>
    <div class="avrow" id="obAv">${AVATARES.map(([a,n])=>`<span class="${a===obAv?'sel':''}" data-a="${a}">${a}<small>${n}</small></span>`).join('')}</div>
    <button class="btn full" onclick="startGame()">🌱 ¡EMPEZAR A PLANTAR!</button>
  </div>`;
  m.classList.add('open');
  $('#obAv').addEventListener('click',e=>{ const s=e.target.closest('span'); if(!s)return; obAv=s.dataset.a;
    document.querySelectorAll('#obAv span').forEach(x=>x.classList.toggle('sel',x.dataset.a===obAv)); });
  $('#obNom').addEventListener('keydown',e=>{ if(e.key==='Enter') startGame(); });
}
function startGame(){
  try{
    const inp=$('#obNom');
    const n=(inp&&inp.value?inp.value:'').trim();
    if(!n){ toast('⚠️ Ponte un nombre de jugador'); return; }
    S.player={name:n, avatar:obAv, xp:0, hojas:0, creditos:5, racha:0};
    initGear(S.player);
    save(); closeModal();
    toast(`${obAv} ¡Bienvenido ${n}! Tienes 5 árboles gratis 🌳`);
    if(!STORAGE_OK) setTimeout(()=>alert('⚠️ Este navegador no deja guardar el progreso.\n\nAbre el archivo con Chrome o Safari (no en la vista previa de WhatsApp/Archivos) para que tus árboles se guarden.'),800);
    TAB='plantar'; render();
    // Si llegó por invitación de ronda, retomarla ya con jugador creado
    if(location.hash.startsWith('#t=')) setTimeout(visitorTreeHash, 600);
  }catch(err){
    alert('⚠️ Error al iniciar: '+err.message+'\n\nIntenta abrir el archivo con Chrome o Safari.');
  }
}

/* ================= INIT ================= */
if(S.player) render();
if(location.hash.startsWith('#a=')) visitorHash();
else if(location.hash.startsWith('#m=')) visitorMonoHash();
else if(location.hash.startsWith('#t=')) visitorTreeHash();
else if(location.hash.startsWith('#c=')) visitorCuponHash();
else if(!S.player) onboarding();
// Refrescar alertas y cuentas regresivas si la pestaña queda abierta
setInterval(()=>{
  if(S.player && (TAB==='arboles'||TAB==='mono') && !$('#modal').classList.contains('open')) render();
}, 180000);
// PWA: instalar service worker (solo en web, no en archivo local)
if('serviceWorker' in navigator && location.protocol.indexOf('http')===0){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
